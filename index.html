<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="布软幼儿园">
<title>BORAN布软狗狗幼儿园 · 今日报告</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --purple:#C8C1F0;--purple-deep:#9B90DC;--purple-dark:#6B5FAD;
    --cream:#FDFAF4;--cream2:#F5F0E8;--peach:#FFE8D6;
    --mint:#D6F0E8;--mint-deep:#5BBFA0;
    --text:#3D3250;--text-soft:#8A7FA8;--white:#FFFFFF;
    --border:rgba(155,144,220,0.25);
  }
  body{font-family:'Noto Sans SC',system-ui,sans-serif;background:var(--cream);min-height:100vh;}

  /* ── HEADER ── */
  .app-header{background:var(--white);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
  .app-logo{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid var(--purple);}
  .app-title{font-size:15px;font-weight:700;color:var(--text);}
  .app-sub{font-size:11px;color:var(--text-soft);}

  /* ── TABS ── */
  .tabs{display:flex;gap:8px;padding:14px 16px 0;max-width:500px;margin:0 auto;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:24px;font-size:13px;font-weight:500;color:var(--text-soft);cursor:pointer;border:1.5px solid var(--border);background:var(--white);transition:all .2s;}
  .tab.active{background:var(--purple-deep);color:var(--white);border-color:var(--purple-deep);}

  /* ── FORM ── */
  .page{padding:14px 16px 40px;max-width:500px;margin:0 auto;}
  .form-section{background:var(--white);border-radius:18px;border:1px solid var(--border);padding:18px;margin-bottom:14px;}
  .section-title{font-size:13px;font-weight:700;color:var(--purple-dark);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
  .field{margin-bottom:12px;}
  .field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:12px;color:var(--text-soft);font-weight:500;margin-bottom:5px;}
  input[type=text],input[type=date],textarea,select{
    width:100%;border:1.5px solid var(--border);border-radius:12px;
    padding:11px 13px;font-size:14px;color:var(--text);
    background:var(--cream);outline:none;font-family:inherit;
    -webkit-appearance:none;transition:border-color .2s;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--purple-deep);}
  textarea{resize:none;height:80px;line-height:1.7;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* mood */
  .mood-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .mood-btn{border:1.5px solid var(--border);border-radius:12px;padding:10px 8px;text-align:center;font-size:13px;color:var(--text-soft);cursor:pointer;background:var(--cream);transition:all .2s;line-height:1.6;}
  .mood-btn.sel{border-color:var(--purple-deep);background:#EDE9FB;color:var(--text);font-weight:500;}

  /* upload */
  .upload-area{border:2px dashed var(--purple);border-radius:14px;background:#F3F0FC;padding:16px;text-align:center;cursor:pointer;}
  .upload-area input{display:none;}
  .preview-imgs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
  .preview-img{width:100%;aspect-ratio:1;border-radius:10px;object-fit:cover;}

  .gen-btn{width:100%;background:linear-gradient(135deg,var(--purple-deep),#7B6FC8);color:white;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.05em;margin-top:4px;font-family:inherit;}

  /* ── REPORT CARD ── */
  #report-panel{display:none;}
  .report-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .screenshot-btn{width:100%;background:var(--purple-dark);color:white;border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
  .back-btn{width:100%;background:var(--white);color:var(--text-soft);border:1.5px solid var(--border);border-radius:14px;padding:13px;font-size:14px;cursor:pointer;font-family:inherit;}

  /* Screenshot tip */
  .tip-box{background:#EDE9FB;border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:13px;color:var(--purple-dark);line-height:1.75;}
  .tip-box strong{font-weight:700;}

  /* ── CARD itself ── */
  #card{background:var(--white);border-radius:24px;border:1px solid var(--border);overflow:hidden;}
  .card-header{background:linear-gradient(145deg,#D4CCEF 0%,#B8AFDF 100%);padding:22px 20px 36px;position:relative;overflow:hidden;}
  .card-header::before{content:'';position:absolute;top:-40px;right:-40px;width:140px;height:140px;background:rgba(255,255,255,0.18);border-radius:50%;}
  .card-header::after{content:'';position:absolute;bottom:-24px;left:24px;width:90px;height:90px;background:rgba(255,255,255,0.12);border-radius:50%;}
  .card-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;position:relative;z-index:2;}
  .card-logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.6);}
  .card-brand{font-size:11px;color:rgba(255,255,255,0.85);font-weight:500;letter-spacing:.08em;}
  .card-dog{font-size:28px;font-weight:700;color:white;position:relative;z-index:2;line-height:1.2;}
  .card-date{font-size:12px;color:rgba(255,255,255,0.8);margin-top:3px;position:relative;z-index:2;}
  .card-star{position:absolute;right:20px;bottom:30px;font-size:36px;opacity:.3;z-index:1;}

  .mood-float{background:var(--white);border-radius:16px;margin:-18px 16px 0;padding:13px 16px;display:flex;align-items:center;gap:12px;position:relative;z-index:3;box-shadow:0 2px 16px rgba(155,144,220,0.15);}
  .mood-float-emoji{font-size:30px;}
  .mood-float-label{font-size:11px;color:var(--text-soft);}
  .mood-float-val{font-size:15px;font-weight:700;color:var(--text);}

  .card-body{padding:16px 16px 20px;display:flex;flex-direction:column;gap:10px;}
  .info-row{background:var(--cream);border-radius:13px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
  .info-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
  .info-key{font-size:11px;color:var(--text-soft);font-weight:500;margin-bottom:2px;}
  .info-val{font-size:13px;color:var(--text);font-weight:500;line-height:1.6;}
  .note-row{background:linear-gradient(135deg,#EDE9FB,#F5EFE0);border-radius:13px;padding:13px 14px;display:flex;gap:10px;}
  .note-icon{font-size:18px;flex-shrink:0;}
  .note-text{font-size:13px;color:var(--text);line-height:1.8;font-weight:500;}

  .card-photos{padding:0 16px;}
  .photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .photo-img{width:100%;aspect-ratio:1;border-radius:11px;object-fit:cover;}

  .card-footer{background:var(--mint);margin:14px 16px 16px;border-radius:13px;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
  .footer-label{font-size:11px;color:var(--mint-deep);font-weight:500;}
  .footer-time{font-size:13px;font-weight:700;color:#2E9A7A;}

  /* ── SCREENSHOT MODE ── */
  body.screenshot-mode .app-header,
  body.screenshot-mode .tabs,
  body.screenshot-mode .report-actions,
  body.screenshot-mode .tip-box{display:none!important;}
  body.screenshot-mode{background:var(--cream2);}
  body.screenshot-mode .page{padding:20px 14px;}
  .exit-screenshot{display:none;position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(61,50,80,0.85);color:white;border:none;border-radius:30px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;backdrop-filter:blur(8px);z-index:999;}
  body.screenshot-mode .exit-screenshot{display:block;}
</style>
</head>

<!-- FORM -->
<div class="page" id="form-panel">
  <div class="form-section">
    <div class="section-title">🐶 基本信息</div>
    <div class="field">
      <label>狗狗名字</label>
      <input type="text" id="f-name" placeholder="例：豆豆、奶茶、布丁">
    </div>
    <div class="field">
      <label>日期</label>
      <input type="date" id="f-date">
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">😊 今日心情</div>
    <div class="mood-grid">
      <div class="mood-btn" onclick="selMood(this,'🥳 开心活泼')">🥳 开心活泼</div>
      <div class="mood-btn" onclick="selMood(this,'😌 安静乖巧')">😌 安静乖巧</div>
      <div class="mood-btn" onclick="selMood(this,'⚡ 疯狂放电')">⚡ 疯狂放电</div>
      <div class="mood-btn" onclick="selMood(this,'🫣 有点紧张')">🫣 有点紧张</div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">📋 今日详情</div>
    <div class="field">
      <label>今日活动</label>
      <input type="text" id="f-act" placeholder="例：嗅觉寻宝 · 自由社交时间">
    </div>
    <div class="field">
      <label>饮食记录</label>
      <input type="text" id="f-food" placeholder="例：10:00 喝水 · 14:30 零食">
    </div>
    <div class="field">
      <label>今日好朋友</label>
      <input type="text" id="f-friend" placeholder="例：和奶茶玩得特别好">
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">💬 老师寄语</div>
    <div class="field">
      <textarea id="f-note" placeholder="今天观察到的可爱细节或进步，例：豆豆今天在寻宝游戏里找到了所有5个零食，专注力超强！"></textarea>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">📷 今日照片（最多3张）</div>
    <div class="upload-area" onclick="document.getElementById('f-imgs').click()">
      <input type="file" id="f-imgs" accept="image/*" multiple onchange="loadImgs(this)">
      <div style="font-size:28px;margin-bottom:4px;">📸</div>
      <div style="font-size:13px;color:var(--purple-dark);font-weight:600;">点击上传照片</div>
      <div style="font-size:11px;color:var(--text-soft);margin-top:2px;">最多3张</div>
    </div>
    <div class="preview-imgs" id="preview-imgs"></div>
  </div>

  <button class="gen-btn" onclick="generate()">生成今日报告 ✨</button>
</div>

<script>
let moodVal = '';
let imgDataArr = [];

document.getElementById('f-date').value = new Date().toISOString().split('T')[0];

function showTab(t) {
  document.getElementById('tab-form').classList.toggle('active', t==='form');
  document.getElementById('tab-report').classList.toggle('active', t==='report');
  document.getElementById('form-panel').style.display = t==='form' ? 'block' : 'none';
  document.getElementById('report-panel').style.display = t==='report' ? 'block' : 'none';
  window.scrollTo(0,0);
}

function selMood(el, val) {
  document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  moodVal = val;
}

function loadImgs(input) {
  const files = Array.from(input.files).slice(0,3);
  imgDataArr = [];
  document.getElementById('preview-imgs').innerHTML = '';
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      imgDataArr.push(e.target.result);
      const img = document.createElement('img');
      img.src = e.target.result;
      img.className = 'preview-img';
      document.getElementById('preview-imgs').appendChild(img);
    };
    reader.readAsDataURL(f);
  });
}

function fmtDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.getFullYear()+'年'+(dt.getMonth()+1)+'月'+dt.getDate()+'日';
}

function generate() {
  const name = document.getElementById('f-name').value.trim() || '宝贝';
  const date = fmtDate(document.getElementById('f-date').value);
  const mood = moodVal || '🐾 状态很好';
  const moodEmoji = mood.split(' ')[0];
  const moodText = mood.replace(moodEmoji,'').trim();

  document.getElementById('rc-name').textContent = name;
  document.getElementById('rc-date').textContent = date ? date + ' 今日报告' : '今日报告';
  document.getElementById('rc-mood-emoji').textContent = moodEmoji;
  document.getElementById('rc-mood-val').textContent = moodText;
  document.getElementById('rc-act').textContent = document.getElementById('f-act').value.trim() || '—';
  document.getElementById('rc-food').textContent = document.getElementById('f-food').value.trim() || '—';
  document.getElementById('rc-friend').textContent = document.getElementById('f-friend').value.trim() || '—';
  document.getElementById('rc-note').textContent = document.getElementById('f-note').value.trim() || '今天表现超棒！';
  document.getElementById('rc-next') && (document.getElementById('rc-next').textContent = '');

  const wrap = document.getElementById('rc-photos-wrap');
  const grid = document.getElementById('rc-photos-grid');
  grid.innerHTML = '';
  if (imgDataArr.length > 0) {
    wrap.style.display = 'block';
    imgDataArr.forEach(src => {
      const img = document.createElement('img');
      img.src = src; img.className = 'photo-img';
      grid.appendChild(img);
    });
  } else { wrap.style.display = 'none'; }

  showTab('report');
}

function enterScreenshot() {
  document.body.classList.add('screenshot-mode');
  window.scrollTo(0,0);
}
function exitScreenshot() {
  document.body.classList.remove('screenshot-mode');
}
</script>
</body>
